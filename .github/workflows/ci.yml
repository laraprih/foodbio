name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── API ──────────────────────────────────────────────────────────────
  api:
    name: API — type-check + test + build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foodin
          POSTGRES_PASSWORD: foodin_test
          POSTGRES_DB: foodin_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U foodin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql://foodin:foodin_test@localhost:5432/foodin_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-minimum-32-chars-long
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
